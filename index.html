<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#6366F1">
<title>QR Guard</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="https://em-content.zobj.net/thumbs/240/google/350/shield_1f6e1-fe0f.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
body{background:#F8FAFC;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.container{max-width:400px;width:100%;}
.header{display:flex;align-items:center;gap:10px;margin-bottom:40px;}
.logo{width:40px;height:40px;background:#6366F1;border-radius:10px;display:flex;align-items:center;justify-content:center;color:white;font-size:22px;}
.app-name{font-size:22px;font-weight:bold;color:#1E293B;}
.title{text-align:center;font-size:28px;font-weight:bold;color:#0F172A;margin-bottom:8px;}
.subtitle{text-align:center;font-size:14px;color:#64748B;margin-bottom:40px;}
.qr-icon{width:200px;height:200px;background:#EEF2FF;border-radius:30px;margin:0 auto 25px;display:flex;align-items:center;justify-content:center;font-size:120px;color:#6366F1;}
.hint{text-align:center;font-size:13px;color:#94A3B8;font-style:italic;margin-bottom:25px;}
.btn-primary{width:100%;padding:16px;background:#6366F1;color:white;border:none;border-radius:12px;font-size:16px;font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:transform 0.2s;}
.btn-primary:active{transform:scale(0.98);}
.btn-primary:hover{background:#5558E3;}
.install-banner{position:fixed;bottom:20px;left:20px;right:20px;background:linear-gradient(135deg,#6366F1,#8B5CF6);color:white;padding:15px;border-radius:15px;display:none;box-shadow:0 10px 40px rgba(99,102,241,0.4);z-index:100;}
.install-banner.show{display:flex;align-items:center;gap:10px;animation:slideUp 0.4s ease;}
@keyframes slideUp{from{transform:translateY(100%);opacity:0;}to{transform:translateY(0);opacity:1;}}
.install-icon{font-size:30px;}
.install-text{flex:1;}
.install-title{font-weight:bold;font-size:14px;}
.install-sub{font-size:12px;opacity:0.9;}
.install-btn{padding:8px 16px;background:white;color:#6366F1;border:none;border-radius:8px;font-weight:bold;cursor:pointer;}
.close-btn{background:none;border:none;color:white;font-size:20px;cursor:pointer;opacity:0.7;}
</style>
</head>
<body>
<div class="container">
<div class="header">
<div class="logo">🛡️</div>
<div class="app-name">QR Guard</div>
</div>
<h1 class="title">Scan & Stay Safe</h1>
<p class="subtitle">Detect malicious QR codes instantly</p>
<div class="qr-icon">▣</div>
<p class="hint">Point your camera at a QR code</p>
<button class="btn-primary" onclick="window.location.href='scan.html'">
<span style="font-size:22px;">▣</span>
Start Scanning
</button>
</div>

<div class="install-banner" id="installBanner">
<span class="install-icon">📱</span>
<div class="install-text">
<div class="install-title">Install QR Guard</div>
<div class="install-sub">Add to home screen for quick access</div>
</div>
<button class="install-btn" onclick="installApp()">Install</button>
<button class="close-btn" onclick="closeBanner()">✕</button>
</div>

<script>
// تسجيل Service Worker
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').then(reg => {
        console.log('[SW] Registered');
    }).catch(err => {
        console.log('[SW] Error:', err);
    });
}

// Install Banner
let deferredPrompt;
const installBanner = document.getElementById('installBanner');

window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    setTimeout(() => {
        installBanner.classList.add('show');
    }, 2000);
});

function installApp() {
    if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then((choiceResult) => {
            if (choiceResult.outcome === 'accepted') {
                console.log('[PWA] Installed');
                installBanner.classList.remove('show');
            }
            deferredPrompt = null;
        });
    }
}

function closeBanner() {
    installBanner.classList.remove('show');
}
</script>
</body>
</html>
