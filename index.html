<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#6366F1">
<title>QR Guard</title>
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
body{background:#F8FAFC;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.container{max-width:400px;width:100%;}
.header{display:flex;align-items:center;gap:10px;margin-bottom:40px;}
.logo{width:40px;height:40px;background:#6366F1;border-radius:10px;display:flex;align-items:center;justify-content:center;color:white;font-size:22px;}
.app-name{font-size:22px;font-weight:bold;color:#1E293B;}
.title{text-align:center;font-size:28px;font-weight:bold;color:#0F172A;margin-bottom:8px;}
.subtitle{text-align:center;font-size:14px;color:#64748B;margin-bottom:40px;}
.qr-icon{width:200px;height:200px;background:#EEF2FF;border-radius:30px;margin:0 auto 25px;display:flex;align-items:center;justify-content:center;font-size:120px;color:#6366F1;}
.hint{text-align:center;font-size:13px;color:#94A3B8;font-style:italic;margin-bottom:25px;}
.btn-primary{width:100%;padding:16px;background:#6366F1;color:white;border:none;border-radius:12px;font-size:16px;font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:transform 0.2s;}
.btn-primary:active{transform:scale(0.98);}
.btn-primary:hover{background:#5558E3;}
</style>
</head>
<body>
<div class="container">
<div class="header">
<div class="logo">🛡️</div>
<div class="app-name">QR Guard</div>
</div>
<h1 class="title">Scan & Stay Safe</h1>
<p class="subtitle">Detect malicious QR codes instantly</p>
<div class="qr-icon">▣</div>
<p class="hint">Point your camera at a QR code</p>
<button class="btn-primary" onclick="window.location.href='scan.html'">
<span style="font-size:22px;">▣</span>
Start Scanning
</button>
</div>
</body>
</html>
